<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRBOT - Tapha Qumaaraa</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #0088cc; }
        .balance { font-size: 20px; margin: 10px 0; }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #218838; }
        .telebirr { background-color: #0056b3; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>HRBOT @kebikobot</h1>
    <p>Baga nagaa dhuftan! Tapha Jalaqabuuf qarshii qabsiisaa.</p>
    
    <div class="balance">💰 Qarshii Qabsiisuu: 10 - 500 ETB</div>
    
    <input type="number" id="amount" placeholder="Hamma Qarshii (ETB)">
    <br>
    <button onclick="playGame()">Tapha Jalqabi</button>
    <br>
    <button class="telebirr" onclick="payTelebirr()">Telebirr-iin Kaffali</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // App-ichi akka guututti banamu godha

    function playGame() {
        let amt = document.getElementById('amount').value;
        if(amt < 10) {
            alert("Maaloo qarshii 10 ol galchaa");
        } else {
            tg.sendData("Tapha: " + amt + " ETB"); // Bot keetti odeeffannoo erga
            alert("Qarshii " + amt + " qabsiistaniittu. Bot keessan hordofaa!");
        }
    }

    function payTelebirr() {
        // Asirratti liinkii Telebirr Merchant keetii galchita
        window.open("https://www.ethiotelecom.et/telebirr/", "_blank");
    }
</script>

</body>
</html>

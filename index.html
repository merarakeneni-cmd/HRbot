<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRBOT Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        h1 { color: #2481cc; margin-bottom: 10px; }
        p { font-size: 1.1em; line-height: 1.5; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; }
        .btn-pay {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-pay:active { transform: scale(0.95); }
        .footer { margin-top: 30px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>HRBOT 🚀</h1>
        <p>Baga nagaan dhufte! Tapha kana taphachuuf kaffaltii qopheessi.</p>
        
        <div style="background: #eef2f7; padding: 15px; border-radius: 10px; margin: 20px 0;">
            <p><strong>Gatii:</strong> 50 ETB</p>
            <p><strong>Lakk. Telebirr:</strong> 09XXXXXXXX</p>
        </div>

        <button class="btn-pay" onclick="payNow()">Telebirr-iin Kaffali</button>

        <p class="footer">Dhaloota Harka Hin Laanne - Resilience & Success</p>
    </div>

    <script>
        // Telegram WebApp Initialize
        const tele = window.Telegram.WebApp;
        tele.expand(); // App-ichi guutuu akka ta'u godha

        function payNow() {
            // Kaffaltii eerga raawwatanii booda gara Bot-itti deebisuu
            tele.showAlert("Kaffaltii kee raawwadhuu screenshot gara bot-itti ergi.");
        }
    </script>
</body>
</html>
